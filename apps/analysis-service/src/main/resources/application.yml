spring:
    application:
        name: analysis-service
    datasource:
        url: jdbc:postgresql://${POSTGRES_HOSTNAME}:${POSTGRES_PORT}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                default_schema: analysis_service

# RabbitMQ
    rabbitmq:
        host: ${RABBITMQ_HOST}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USER}
        password: ${RABBITMQ_PASSWORD}
        virtual-host: ${RABBITMQ_VHOST:/}

# JWT secret (shared with other services via common library)
jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

# Expose actuator endpoints for monitoring
management:
    endpoints:
        web:
            exposure:
                include: health,info

server:
    port: ${ANALYSIS_SERVICE_PORT}
