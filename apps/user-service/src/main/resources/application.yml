spring:
    application:
      name: user-service
    datasource:
        url: jdbc:postgresql://${POSTGRES_HOSTNAME}:${POSTGRES_PORT}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT secret (store in .env or secrets; used in your common lib)
jwt:
    secret: ${JWT_SECRET}  # At least 256 bits for HS256
    expiration: ${JWT_EXPIRATION}  # 24 hours

# Expose actuator endpoints for monitoring and management
management:
    endpoints:
        web:
            exposure:
                include: health,info

server:
    port: ${USER_SERVICE_PORT}