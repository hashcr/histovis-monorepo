spring:
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update  # or create-drop for fully clean schema each test run
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never  # prevents Spring from running schema.sql/data.sql automatically unless you want it

logging:
  level:
    org.springframework: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
