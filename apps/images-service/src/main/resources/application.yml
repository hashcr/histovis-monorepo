spring:
    application:
        name: images-service
    servlet:
        multipart:
            max-file-size: 2GB
            max-request-size: 2GB
    datasource:
        url: jdbc:postgresql://${POSTGRES_HOSTNAME}:${POSTGRES_PORT}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
        driver-class-name: org.postgresql.Driver
    rabbitmq:
        host: ${RABBITMQ_HOST:rabbitmq}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USER:histovis}
        password: ${RABBITMQ_PASSWORD:histovis123}
        virtual-host: ${RABBITMQ_VHOST:/}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                default_schema: images_service

# JWT secret (shared with users-service via common library)
jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

# Object storage configuration
storage:
    type: ${STORAGE_TYPE:minio}
    minio:
        endpoint: ${MINIO_ENDPOINT}
        public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}
        access-key: ${MINIO_ACCESS_KEY}
        secret-key: ${MINIO_SECRET_KEY}
        bucket: ${MINIO_BUCKET}

# Expose actuator endpoints for monitoring
management:
    endpoints:
        web:
            exposure:
                include: health,info

server:
    port: ${IMAGES_SERVICE_PORT}
